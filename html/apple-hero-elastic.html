<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mac — 大标题滚动与顶部阻尼</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #000;
      color: #f5f5f7;
      overflow-x: hidden;
    }

    /* 首屏滚动区：拉高页面，让大标题有一段「跟滚动上移」的空间 */
    .hero-scroll {
      height: 220vh;
      position: relative;
    }

    .hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-inner {
      text-align: center;
      padding: 0 24px;
      will-change: transform, opacity;
    }

    .hero-title {
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 0.35em;
    }

    .hero-sub {
      font-size: clamp(18px, 2.8vw, 28px);
      font-weight: 400;
      opacity: 0.88;
      max-width: 28em;
      margin: 0 auto;
      line-height: 1.35;
    }

    .after {
      min-height: 100vh;
      padding: 80px 24px 120px;
      text-align: center;
      background: linear-gradient(180deg, #000 0%, #0d0d0f 40%, #111 100%);
    }

    .after h2 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .after p {
      opacity: 0.65;
      font-size: 17px;
      line-height: 1.6;
      max-width: 36em;
      margin: 0 auto;
    }

    .hint {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      opacity: 0.45;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-inner {
        will-change: auto;
      }
    }
  </style>
</head>
<body>
  <div class="hint" id="hint">向下滚动 · 在页面顶部继续上滑可看阻尼回弹</div>

  <section class="hero-scroll" aria-label="首屏大标题">
    <div class="hero-sticky">
      <div class="hero-inner" id="heroInner">
        <h1 class="hero-title">Mac</h1>
        <p class="hero-sub">实力，实打实超值。</p>
      </div>
    </div>
  </section>

  <section class="after">
    <h2>轻薄 · 强大 · 持久续航</h2>
    <p>下方为普通内容区。首屏通过 sticky + 滚动映射模拟苹果产品页大标题随卷动上移、略缩放的观感；在滚动条已在顶部时继续「向上」搓滚轮或下拉，可看到额外阻尼位移（桌面端更明显）。</p>
  </section>

  <script>
    (function () {
      var heroInner = document.getElementById('heroInner');
      var hint = document.getElementById('hint');
      if (!heroInner) return;

      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var parallaxY = 0;
      var elasticY = 0;
      var elasticVel = 0;
      var rafId = 0;

      var PARALLAX_FACTOR = 0.42;
      var MAX_PARALLAX = 220;
      var SCALE_RANGE = 900;
      var MIN_SCALE = 0.88;

      var ELASTIC_STIFFNESS = 0.18;
      var ELASTIC_DAMPING = 0.82;
      var ELASTIC_MAX = 72;
      var WHEEL_GAIN = 0.14;

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function getScrollParallaxTarget() {
        var y = window.scrollY || document.documentElement.scrollTop;
        var raw = y * PARALLAX_FACTOR;
        return -clamp(raw, 0, MAX_PARALLAX);
      }

      function getScale() {
        var y = window.scrollY || document.documentElement.scrollTop;
        var t = clamp(y / SCALE_RANGE, 0, 1);
        return 1 - (1 - MIN_SCALE) * t;
      }

      function getOpacity() {
        var y = window.scrollY || document.documentElement.scrollTop;
        return clamp(1 - y / (SCALE_RANGE * 1.2), 0.55, 1);
      }

      function applyTransform() {
        var ty = parallaxY + elasticY;
        var sc = getScale();
        var op = getOpacity();
        heroInner.style.opacity = String(op);
        heroInner.style.transform =
          'translate3d(0,' + ty.toFixed(2) + 'px,0) scale(' + sc.toFixed(4) + ')';
      }

      function tick() {
        rafId = 0;
        if (reduceMotion) {
          parallaxY = getScrollParallaxTarget();
          elasticY = 0;
          applyTransform();
          return;
        }

        var targetP = getScrollParallaxTarget();
        parallaxY += (targetP - parallaxY) * 0.22;

        elasticVel += -elasticY * ELASTIC_STIFFNESS;
        elasticVel *= ELASTIC_DAMPING;
        elasticY += elasticVel;

        if (Math.abs(elasticY) < 0.15 && Math.abs(elasticVel) < 0.02) {
          elasticY = 0;
          elasticVel = 0;
        }

        applyTransform();

        if (Math.abs(targetP - parallaxY) > 0.05 || Math.abs(elasticY) > 0.05 || Math.abs(elasticVel) > 0.01) {
          rafId = requestAnimationFrame(tick);
        }
      }

      function schedule() {
        if (!rafId) rafId = requestAnimationFrame(tick);
      }

      function onScroll() {
        schedule();
        if (hint && window.scrollY > 80) hint.style.opacity = '0';
      }

      function onWheel(e) {
        if (reduceMotion) return;
        var top = (window.scrollY || document.documentElement.scrollTop) <= 0;
        if (!top) return;
        if (e.deltaY >= 0) return;

        var pull = -e.deltaY * WHEEL_GAIN;
        elasticVel += pull * 0.06;
        elasticY = clamp(elasticY + pull * 0.08, -ELASTIC_MAX, ELASTIC_MAX);
        schedule();
      }

      var touchStartY = 0;
      var touchPulling = false;

      function onTouchStart(e) {
        if (reduceMotion || !e.touches.length) return;
        touchStartY = e.touches[0].clientY;
        touchPulling = (window.scrollY || document.documentElement.scrollTop) <= 0;
      }

      function onTouchMove(e) {
        if (reduceMotion || !touchPulling || !e.touches.length) return;
        var dy = e.touches[0].clientY - touchStartY;
        if (dy > 0) {
          elasticY = clamp(dy * 0.35, 0, ELASTIC_MAX);
          schedule();
        }
      }

      function onTouchEnd() {
        touchPulling = false;
        touchStartY = 0;
        schedule();
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('wheel', onWheel, { passive: true });
      window.addEventListener('touchstart', onTouchStart, { passive: true });
      window.addEventListener('touchmove', onTouchMove, { passive: true });
      window.addEventListener('touchend', onTouchEnd, { passive: true });

      applyTransform();
      onScroll();
    })();
  </script>
</body>
</html>
